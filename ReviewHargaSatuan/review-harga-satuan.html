<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Harga Satuan</title>
  <style>
    :root {
      --navy: #081849;
      --text: #14285e;
      --muted: #52669a;
      --line: #dfe7f2;
      --soft-line: #edf2f8;
      --blue: #0b77ff;
      --blue-soft: #e6f1ff;
      --green: #08a63a;
      --green-dark: #009734;
      --gray: #aeb7c7;
      --gray-soft: #eef2f6;
      --shadow: 0 15px 38px rgba(15, 23, 42, 0.065);
      --soft-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      --radius-lg: 14px;
      --radius-md: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f3f6fb;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar-frame {
      width: 320px;
      min-width: 320px;
      height: 100vh;
      border: 0;
      background: #fff;
      position: sticky;
      top: 0;
    }

    .app-main {
      flex: 1;
      min-width: 0;
    }

    .page {
      width: min(1520px, calc(100% - 68px));
      margin: 25px auto 40px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #0c3d82;
      font-size: 17px;
      font-weight: 650;
      margin-bottom: 31px;
      flex-wrap: wrap;
    }

    .breadcrumb svg {
      color: #7b8aa6;
      flex: 0 0 auto;
    }

    .breadcrumb .current {
      color: var(--navy);
      font-weight: 850;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 42px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 68px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    h1 {
      margin: 0 0 13px;
      color: var(--navy);
      font-size: 42px;
      line-height: 1.04;
      letter-spacing: -0.048em;
      font-weight: 880;
    }

    .subtitle {
      margin: 0;
      color: #3450a0;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 520;
    }

    .pipeline-card,
    .summary-card,
    .table-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--soft-shadow);
    }

    .pipeline-card {
      padding: 35px 68px 31px;
      margin-bottom: 31px;
    }

    .stepper {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      position: relative;
    }

    .stepper::before {
      content: "";
      position: absolute;
      top: 20px;
      left: 58px;
      right: 58px;
      height: 4px;
      background: #dfe4eb;
      border-radius: 999px;
    }

    .step-progress {
      position: absolute;
      top: 20px;
      left: 58px;
      height: 4px;
      width: 0;
      border-radius: 999px;
      background: var(--green);
      z-index: 1;
      transition: width 0.26s ease;
    }

    .step {
      position: relative;
      z-index: 2;
      text-align: center;
      min-height: 145px;
    }

    .step-circle {
      width: 47px;
      height: 47px;
      margin: 0 auto 17px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: #aab3c2;
      font-size: 18px;
      font-weight: 880;
      box-shadow: 0 5px 13px rgba(15, 23, 42, 0.12);
    }

    .step.done .step-circle {
      background: linear-gradient(180deg, #1fc15f, #059d3c);
    }

    .step.active .step-circle {
      background: linear-gradient(180deg, #2687ff, #0d66df);
      box-shadow: 0 8px 18px rgba(22, 119, 242, 0.27);
    }

    .step-title {
      color: var(--navy);
      font-size: 18px;
      line-height: 1.42;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .step-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 5px 12px;
      border-radius: 999px;
      color: #60708b;
      background: var(--gray-soft);
      font-size: 14px;
      font-weight: 620;
    }

    .step.done .step-status {
      color: #08a63a;
      background: #dff8e7;
    }

    .step.active .step-status {
      color: #076be8;
      background: var(--blue-soft);
    }

    .step-date {
      display: block;
      margin-top: 8px;
      color: #687690;
      font-size: 14px;
      font-weight: 520;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 31px;
      margin-bottom: 28px;
    }

    .summary-card {
      min-height: 153px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .summary-card small {
      display: block;
      color: var(--navy);
      font-size: 24px;
      line-height: 1.15;
      font-weight: 850;
      margin-bottom: 17px;
    }

    .summary-card strong {
      display: block;
      font-size: 36px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 880;
    }

    .text-blue { color: #0b77ff; }
    .text-green { color: var(--green); }
    .text-navy { color: var(--navy); }

    .table-card {
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .table-toolbar {
      min-height: 73px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 30px;
      border-bottom: 1px solid var(--line);
    }

    .btn {
      height: 51px;
      border-radius: 8px;
      border: 1px solid #dbe2ed;
      background: #fff;
      color: var(--navy);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 0 20px;
      font-size: 15px;
      font-weight: 820;
      white-space: nowrap;
      box-shadow: var(--soft-shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.09);
    }

    .btn-primary {
      color: #fff;
      border-color: #009b36;
      background: linear-gradient(180deg, #0bc742 0%, #02ad3b 50%, #009b35 100%);
      box-shadow: 0 13px 25px rgba(0, 151, 52, 0.22);
    }

    .add-review-btn {
      min-width: 224px;
    }

    .done-wrap {
      display: flex;
      justify-content: flex-end;
      padding-top: 26px;
    }

    .finish-btn {
      min-width: 226px;
      height: 63px;
      font-size: 24px;
      border-radius: 9px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      border-right: 1px solid var(--soft-line);
      border-bottom: 1px solid var(--soft-line);
      vertical-align: middle;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    thead th {
      height: 58px;
      color: var(--navy);
      background: #fff;
      padding: 0 26px;
      font-size: 18px;
      font-weight: 850;
      text-align: left;
      white-space: nowrap;
    }

    thead th.center,
    tbody td.center {
      text-align: center;
    }

    thead th.numeric,
    tbody td.numeric {
      text-align: right;
    }

    tbody td {
      height: 62px;
      color: var(--navy);
      padding: 0 26px;
      font-size: 18px;
      font-weight: 650;
    }

    tbody tr.group-row td {
      height: 53px;
      background: #e8f4ff;
      font-size: 24px;
      font-weight: 880;
      text-transform: uppercase;
    }

    tbody tr.total-row td {
      height: 66px;
      background: #fbfcfe;
      font-size: 27px;
      font-weight: 890;
    }

    .total-label {
      text-align: center;
    }

    .col-code { width: 150px; }
    .col-item { width: 520px; }
    .col-money { width: 315px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 28px;
      background: rgba(8, 18, 38, 0.38);
      z-index: 80;
    }

    .modal-backdrop.show {
      display: grid;
    }

    .modal {
      width: min(640px, 100%);
      background: #fff;
      border: 1px solid #e0e7f0;
      border-radius: 16px;
      box-shadow: 0 30px 76px rgba(8, 18, 38, 0.26);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
    }

    .modal-header h2 {
      margin: 0;
      color: var(--navy);
      font-size: 24px;
      font-weight: 880;
      letter-spacing: -0.03em;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid #d6e0ed;
      color: var(--navy);
      background: #fff;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-grid {
      display: grid;
      gap: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--navy);
      font-size: 15px;
      font-weight: 820;
    }

    .input {
      width: 100%;
      height: 50px;
      border: 1px solid #d4deec;
      border-radius: 8px;
      background: #fff;
      color: var(--navy);
      padding: 0 14px;
      font-size: 15px;
      font-weight: 650;
      outline: none;
    }

    .input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(11, 111, 255, 0.1);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 22px;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      max-width: 430px;
      min-width: 280px;
      padding: 15px 18px;
      color: #07356f;
      background: #eef7ff;
      border: 1px solid #cae4ff;
      border-radius: 12px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
      font-size: 14px;
      font-weight: 760;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .is-finished .add-review-btn,
    .is-finished .finish-btn {
      opacity: 0.76;
    }

    @media (max-width: 1100px) {
      .app-shell {
        flex-direction: column;
      }

      .sidebar-frame {
        width: 100%;
        min-width: 100%;
        height: 100vh;
        position: static;
      }

      .page {
        width: calc(100% - 32px);
      }

      .topbar {
        flex-direction: column;
      }

      .action-group {
        margin-top: 0;
        justify-content: flex-start;
      }

      .pipeline-card {
        padding: 26px 24px;
        overflow-x: auto;
      }

      .stepper {
        min-width: 980px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
    }

    @media (max-width: 720px) {
      .breadcrumb {
        gap: 10px;
        font-size: 14px;
      }

      h1 {
        font-size: 34px;
      }

      .subtitle {
        font-size: 16px;
      }

      .action-group,
      .action-group .btn {
        width: 100%;
      }

      .summary-card small {
        font-size: 20px;
      }

      .summary-card strong {
        font-size: 30px;
      }

      .table-toolbar,
      .done-wrap {
        justify-content: stretch;
      }

      .btn,
      .add-review-btn,
      .finish-btn {
        width: 100%;
      }

      .modal-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <iframe
      class="sidebar-frame"
      src="../sidebar.html?page=ReviewHargaSatuan/review-harga-satuan.html"
      title="Sidebar Navigation"
    ></iframe>
    <div class="app-main">
  <main class="page" id="pageRoot">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <span>Review Harga Satuan</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
      <span>Daftar</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
      <span>Detail Proyek</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
      <span class="current">Review Harga Satuan</span>
    </nav>

    <section class="topbar">
      <div class="title-wrap">
        <h1>Review Harga Satuan</h1>
        <p class="subtitle">ID Proyek: RVS-2025-000123</p>
      </div>

      <div class="action-group">
        <button class="btn" id="backBtn" type="button">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" /></svg>
          Kembali ke Review Harga Material
        </button>
      </div>

    <section class="pipeline-card" aria-label="Pipeline proyek">

    <section class="summary-grid" aria-label="Ringkasan nilai review">

      <div class="summary-card">

      <div class="summary-card">
        <div>
          <small>Total Hasil Review</small>
          <strong class="text-navy" id="totalReviewCard">766.403.937,56</strong>

    <section class="table-card">

      <div class="table-wrap">

          <tbody id="reviewTableBody"></tbody>
        </table>
      </div>
    </section>

    <div class="done-wrap">
      <button class="btn btn-primary finish-btn" id="finishBtn" type="button">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2" /><path d="m8 12 2.6 2.6L16.5 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
        Selesai
      </button>
    </div>
  </main>
    </div>
  </div>

  <div class="modal-backdrop" id="reviewModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Hasil Review</h2>
        <button class="close-btn" id="closeModalBtn" type="button" aria-label="Tutup modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" /></svg>

      <form class="modal-body" id="reviewForm">

            <input class="input" id="itemInput" type="text" value="Item Review Baru" required />
          </div>
          <div class="field">
            <label for="proposalInput">Nilai Proposal</label>
            <input class="input" id="proposalInput" type="text" value="0,00" required />
          </div>
          <div class="field">
            <label for="convertInput">Nilai Convert</label>

          </div>

          <button class="btn btn-primary" type="submit">Simpan Hasil Review</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const PROJECT_STORAGE_KEY = "review-harga-satuan-projects";
    const PROJECT_FLOW_KEY = "review-harga-satuan-project-flow";
    const stages = [
      { key: "draft", title: "Draft", date: "20 Apr 2025" },
      { key: "verifikasi", title: "Verifikasi", date: "21 Apr 2025" },
      { key: "convert_rab", title: "Convert RAB", date: "22 Apr 2025" },
      { key: "review_material", title: "Review Harga Material", date: "22 Apr 2025" },
      { key: "review_satuan", title: "Review Harga Satuan", date: "22 Apr 2025" }
    ];

    const state = {
      stage: "review_satuan",
      finished: false,
      rows: [
        {
          type: "group",
          title: "REKAPITULASI"
        },
        {
          code: "A",
          item: "Rehabilitasi Ruang Kelas 8 Lokal (Lokasi B)",
          proposal: 564625096.06,
          convert: 529897767.20,
          review: 531250000.00
        },
        {
          code: "B",
          item: "Rehabilitasi Ruang Perpustakaan (Lokasi A)",
          proposal: 123197872.94,
          convert: 131475079.25,
          review: 129950000.00
        },
        {
          code: "C",
          item: "Rehabilitasi Toilet, Dapur, Gudang dan Musholla (Lokasi C)",
          proposal: 63599329.23,
          convert: 63622183.27,
          review: 63500000.00
        },
        {
          code: "D",
          item: "Biaya Management",
          proposal: 41703937.55,
          convert: 41703937.56,
          review: 41703937.56
        }
      ]
    };

    const pageParams = new URLSearchParams(window.location.search);
    const projectData = {
      id: pageParams.get("id") || "RVS-2025-000123",
      project: pageParams.get("project") || "",
      school: pageParams.get("school") || "",
      location: pageParams.get("location") || ""
    };

    const els = {
      pageRoot: document.getElementById("pageRoot"),
      stepper: document.getElementById("stepper"),
      stepProgress: document.getElementById("stepProgress"),
      tableBody: document.getElementById("reviewTableBody"),
      totalProposalCard: document.getElementById("totalProposalCard"),
      totalConvertCard: document.getElementById("totalConvertCard"),
      totalReviewCard: document.getElementById("totalReviewCard"),
      addReviewBtn: document.getElementById("addReviewBtn"),
      backBtn: document.getElementById("backBtn"),
      finishBtn: document.getElementById("finishBtn"),
      modal: document.getElementById("reviewModal"),
      reviewForm: document.getElementById("reviewForm"),
      toast: document.getElementById("toast")
    };

    function readStoredProjects() {
      try {
        return JSON.parse(window.localStorage.getItem(PROJECT_STORAGE_KEY) || "[]");
      } catch (error) {
        return [];
      }
    }

    function writeStoredProjects(projects) {
      window.localStorage.setItem(PROJECT_STORAGE_KEY, JSON.stringify(projects));
    }

    function readProjectFlowStore() {
      try {
        return JSON.parse(window.localStorage.getItem(PROJECT_FLOW_KEY) || "{}");
      } catch (error) {
        return {};
      }
    }

    function writeProjectFlowStore(store) {
      window.localStorage.setItem(PROJECT_FLOW_KEY, JSON.stringify(store));
    }

    function updateProjectListStatus(status, stage) {
      const projects = readStoredProjects();
      const idx = projects.findIndex(project => project.id === projectData.id);
      if (idx < 0) return;
      projects[idx] = {
        ...projects[idx],
        status: status || projects[idx].status,
        stage: stage || projects[idx].stage
      };
      writeStoredProjects(projects);
    }

    function hydrateFromFlowStore() {
      const flow = readProjectFlowStore()[projectData.id];
      if (!flow) return;

      if (Array.isArray(flow.step5?.rows) && flow.step5.rows.length) {
        state.rows = flow.step5.rows.map(row => ({ ...row }));
      } else if (Array.isArray(flow.step3?.items) && flow.step3.items.length) {
        state.rows = [
          { type: "group", title: "REKAPITULASI" },
          ...flow.step3.items.map(item => ({
            code: item.kode,
            item: item.item,
            proposal: item.proposal,
            convert: item.convert,
            review: item.convert
          }))
        ];
      }

      if (typeof flow.step5?.finished === "boolean") {
        state.finished = flow.step5.finished;
      }
    }

    function persistReviewFlow(nextStage) {
      const flowStore = readProjectFlowStore();
      const previousFlow = flowStore[projectData.id] || {};
      const resolvedStage = nextStage === "selesai" ? "review_satuan" : (nextStage || "review_satuan");
      flowStore[projectData.id] = {
        ...previousFlow,
        id: projectData.id,
        stage: resolvedStage,
        status: state.finished || nextStage === "selesai" ? "Selesai" : "Review Harga Satuan",
        step5: {
          rows: state.rows.map(row => ({ ...row })),
          finished: state.finished,
          updatedAt: new Date().toISOString(),
          completed: state.finished
        }
      };
      writeProjectFlowStore(flowStore);
      updateProjectListStatus(flowStore[projectData.id].status, flowStore[projectData.id].stage);
    }

    function buildReviewMaterialUrl() {
      const params = new URLSearchParams({
        id: projectData.id,
        project: projectData.project,
        school: projectData.school,
        location: projectData.location,
        status: "Review Harga Material"
      });
      return `review-harga-material.html?${params.toString()}`;
    }

    function renderStepper(activeKey) {
      const activeIndex = Math.max(0, stages.findIndex(stage => stage.key === activeKey));
      els.stepper.querySelectorAll(".step").forEach(step => step.remove());

      stages.forEach((stage, index) => {
        const step = document.createElement("div");
        step.className = "step";
        if (index < activeIndex || state.finished) step.classList.add("done");
        if (index === activeIndex && !state.finished) step.classList.add("active");
        if (index === activeIndex && state.finished) step.classList.add("done");

        const isDone = index < activeIndex || state.finished || index === activeIndex;
        const circleContent = isDone
          ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 12 4 4 8-9" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" /></svg>`
          : String(index + 1);

        let statusText = "Belum Dimulai";
        if (index < activeIndex || state.finished) statusText = "Selesai";
        if (index === activeIndex && !state.finished) statusText = "Sedang Proses";

        step.innerHTML = `
          <div class="step-circle">${circleContent}</div>
          <div class="step-title">${stage.title}</div>
          <span class="step-status">${statusText}</span>
          <span class="step-date">${stage.date}</span>
        `;

        els.stepper.appendChild(step);
      });

      const maxWidth = els.stepper.clientWidth - 116;
      const progressWidth = state.finished ? maxWidth : maxWidth * (activeIndex / (stages.length - 1));
      els.stepProgress.style.width = `${progressWidth}px`;
      document.getElementById("currentStage").value = activeKey;
    }

    function formatPrice(value) {
      return Number(value || 0).toLocaleString("id-ID", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function parsePrice(value) {
      const clean = String(value)
        .replace(/\./g, "")
        .replace(/,/g, ".")
        .replace(/[^0-9.-]/g, "");
      return Number(clean) || 0;
    }

    function renderTable() {
      els.tableBody.innerHTML = "";

      state.rows.forEach(row => {
        const tr = document.createElement("tr");

        if (row.type === "group") {
          tr.className = "group-row";
          tr.innerHTML = `
            <td></td>
            <td colspan="4">${row.title}</td>
          `;
        } else {
          tr.innerHTML = `
            <td class="center">${row.code}</td>
            <td>${row.item}</td>
            <td class="numeric">${formatPrice(row.proposal)}</td>
            <td class="numeric">${formatPrice(row.convert)}</td>
            <td class="numeric">${formatPrice(row.review)}</td>
          `;
        }

        els.tableBody.appendChild(tr);
      });

      const totals = calculateTotals();
      const totalRow = document.createElement("tr");
      totalRow.className = "total-row";
      totalRow.innerHTML = `
        <td colspan="2" class="total-label">TOTAL</td>
        <td class="numeric text-blue">${formatPrice(totals.proposal)}</td>
        <td class="numeric text-green">${formatPrice(totals.convert)}</td>
        <td class="numeric text-navy">${formatPrice(totals.review)}</td>
      `;
      els.tableBody.appendChild(totalRow);

      els.totalProposalCard.textContent = formatPrice(totals.proposal);
      els.totalConvertCard.textContent = formatPrice(totals.convert);
      els.totalReviewCard.textContent = formatPrice(totals.review);
    }

    function calculateTotals() {
      return state.rows.reduce((acc, row) => {
        if (row.type === "group") return acc;
        acc.proposal += row.proposal;
        acc.convert += row.convert;
        acc.review += row.review;
        return acc;
      }, { proposal: 0, convert: 0, review: 0 });
    }

    function openModal() {
      if (state.finished) {
        showToast("Data sudah selesai. Tambah review dikunci biar hasil final tetap waras.");
        return;
      }
      els.modal.classList.add("show");
      document.getElementById("codeInput").focus();
    }

    function closeModal() {
      els.modal.classList.remove("show");
    }

    function addReview(event) {
      event.preventDefault();

      const row = {
        code: document.getElementById("codeInput").value.trim() || "-",
        item: document.getElementById("itemInput").value.trim() || "Item Review Baru",
        proposal: parsePrice(document.getElementById("proposalInput").value),
        convert: parsePrice(document.getElementById("convertInput").value),
        review: parsePrice(document.getElementById("reviewInput").value)
      };

      state.rows.push(row);
      persistReviewFlow("review_satuan");
      renderTable();
      closeModal();
      showToast(`Hasil review kode "${row.code}" berhasil ditambahkan.`);
      els.reviewForm.reset();
      document.getElementById("codeInput").value = nextCode();
      document.getElementById("itemInput").value = "Item Review Baru";
      document.getElementById("proposalInput").value = "0,00";
      document.getElementById("convertInput").value = "0,00";
      document.getElementById("reviewInput").value = "0,00";
    }

    function nextCode() {
      const codes = state.rows.filter(row => row.type !== "group").map(row => row.code);
      const last = codes[codes.length - 1] || "D";
      const charCode = last.length === 1 ? last.charCodeAt(0) + 1 : 69;
      return String.fromCharCode(Math.min(charCode, 90));
    }

    function finishReview() {
      state.finished = true;
      els.pageRoot.classList.add("is-finished");
      els.finishBtn.innerHTML = `
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2" /><path d="m8 12 2.6 2.6L16.5 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
        Selesai
      `;
      persistReviewFlow("selesai");
      renderStepper(state.stage);
      showToast("Review Harga Satuan selesai. Data sudah masuk status final.");
    }

    function goBack() {
      persistReviewFlow("review_satuan");
      window.location.href = buildReviewMaterialUrl();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2600);
    }

    els.addReviewBtn.addEventListener("click", openModal);
    els.backBtn.addEventListener("click", goBack);
    els.finishBtn.addEventListener("click", finishReview);
    els.reviewForm.addEventListener("submit", addReview);
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("cancelModalBtn").addEventListener("click", closeModal);
    els.modal.addEventListener("click", event => {
      if (event.target === els.modal) closeModal();
    });
    window.addEventListener("resize", () => renderStepper(state.stage));

    hydrateFromFlowStore();
    if (state.finished) {
      els.pageRoot.classList.add("is-finished");
      els.finishBtn.innerHTML = `
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2" /><path d="m8 12 2.6 2.6L16.5 8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
        Selesai
      `;
    }
    renderStepper(state.stage);
    renderTable();
  </script>
</body>
</html>
