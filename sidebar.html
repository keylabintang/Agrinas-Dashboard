  <script>
    const dropdownButtons = document.querySelectorAll('.nav-dropdown-toggle');
    const navLinks = document.querySelectorAll('.nav-link');
    const activePage = new URLSearchParams(window.location.search).get('page') || 'dashboard.html';

    function setActiveLink(link) {
      navLinks.forEach((item) => {
        item.classList.remove('bg-agrinas-light-green', 'text-agrinas-green');
        item.classList.add('text-gray-500');

        const iconWrap = item.querySelector('.nav-dashboard-icon');
        const iconSvg = item.querySelector('.nav-dashboard-icon-svg');
        const label = item.querySelector('span');

        if (iconWrap) {
          iconWrap.classList.remove('bg-agrinas-green');
          iconWrap.classList.add('bg-gray-100');
        }

        if (iconSvg) {
          iconSvg.classList.remove('text-white');
          iconSvg.classList.add('text-agrinas-green');
        }

        if (label) {
          label.classList.remove('text-agrinas-green');
          label.classList.add('text-gray-500');
        }

        const container = item.closest('.nav-subitem');
        if (container) {
          container.classList.remove('sub-item-active');
        }
      });

      link.classList.add('bg-agrinas-light-green', 'text-agrinas-green');
      link.classList.remove('text-gray-500');

      const iconWrap = link.querySelector('.nav-dashboard-icon');
      const iconSvg = link.querySelector('.nav-dashboard-icon-svg');
      const label = link.querySelector('span');

      if (iconWrap) {
        iconWrap.classList.add('bg-agrinas-green');
        iconWrap.classList.remove('bg-gray-100');
      }

      if (iconSvg) {
        iconSvg.classList.add('text-white');
        iconSvg.classList.remove('text-agrinas-green');
      }

      if (label) {
        label.classList.remove('text-gray-500');
        label.classList.add('text-agrinas-green');
      }

      const subitem = link.closest('.nav-subitem');
      if (subitem) {
        subitem.classList.add('sub-item-active');
        const submenu = subitem.closest('.tree-line-container');
        if (submenu) {
          submenu.hidden = false;
          const controller = document.querySelector('[aria-controls="' + submenu.id + '"]');
          if (controller) {
            controller.setAttribute('aria-expanded', 'true');
          }
        }
      }
    }

    dropdownButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.getAttribute('aria-controls');
        const submenu = document.getElementById(targetId);
        const isExpanded = button.getAttribute('aria-expanded') === 'true';

        button.setAttribute('aria-expanded', String(!isExpanded));
        submenu.hidden = isExpanded;
      });
    });

    navLinks.forEach((link) => {
      link.addEventListener('click', (event) => {
        if (link.getAttribute('href') === '#') {
          event.preventDefault();
        }

        setActiveLink(link);
      });
    });

    const currentLink = document.querySelector('.nav-link[data-page="' + activePage + '"]');
    if (currentLink) {
      setActiveLink(currentLink);
    }
  </script>
