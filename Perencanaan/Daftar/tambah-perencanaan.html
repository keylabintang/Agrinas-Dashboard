<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assign Surveyor</title>
  <style>
    :root {
      --navy: #07184a;
      --blue: #096bff;
      --blue-soft: #eef7ff;
      --green: #08a63a;
      --green-dark: #009b34;
      --text: #13245a;
      --muted: #6b7899;
      --line: #dfe7f2;
      --focus: #86bdff;
      --field: #ffffff;
      --field-readonly: #fafcff;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.075);
      --soft-shadow: 0 8px 18px rgba(15, 23, 42, 0.045);
      --radius-lg: 16px;
      --radius-md: 9px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    select {
      font-family: inherit;
    }

    button,
    select {
      cursor: pointer;
    }

    .page {
      width: min(1416px, calc(100% - 22px));
      margin: 20px auto 34px;
    }

    .top-back {
      margin-bottom: 28px;
    }

    .btn,
    .back-btn {
      height: 60px;
      border-radius: 9px;
      border: 1px solid #d7e0ed;
      background: #fff;
      color: var(--navy);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 0 25px;
      font-size: 20px;
      font-weight: 850;
      box-shadow: var(--soft-shadow);
      white-space: nowrap;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover,
    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.085);
    }

    .back-btn {
      min-width: 162px;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 47px;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 21px;
      padding-top: 2px;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: 65px;
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 45px;
      padding: 0 18px;
      border-radius: 8px;
      color: #006dff;
      background: #f0f7ff;
      border: 1px solid #badcff;
      font-size: 22px;
      font-weight: 700;
      white-space: nowrap;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 28px;
      padding-top: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-outline-green {
      min-width: 235px;
      color: var(--green);
      border: 2px solid var(--green);
      background: #fff;
      box-shadow: none;
    }

    .btn-primary {
      min-width: 237px;
      color: #fff;
      border-color: var(--green-dark);
      background: linear-gradient(180deg, #0ac742 0%, #02ad3b 48%, #009a35 100%);
      box-shadow: 0 14px 28px rgba(0, 150, 52, 0.22);
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 43px 40px 62px;
    }

    .section-title {
      margin: 0 0 34px;
      color: var(--navy);
      font-size: 31px;
      line-height: 1.1;
      letter-spacing: -0.035em;
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 43px 47px;
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: block;
      margin-bottom: 15px;
      color: var(--navy);
      font-size: 21px;
      line-height: 1.15;
      font-weight: 850;
    }

    .input,
    .select {
      width: 100%;
      height: 75px;
      border: 1px solid #c6d2e5;
      border-radius: 9px;
      background: var(--field);
      color: var(--navy);
      padding: 0 24px;
      font-size: 24px;
      font-weight: 550;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(15, 23, 42, 0.025);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .input:focus,
    .select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(9, 107, 255, 0.1);
    }

    .input[readonly] {
      color: #7180a5;
      background: var(--field-readonly);
      cursor: not-allowed;
    }

    .select {
      appearance: none;
      padding-right: 58px;
      background-image: linear-gradient(45deg, transparent 50%, #52618c 50%), linear-gradient(135deg, #52618c 50%, transparent 50%);
      background-position: calc(100% - 34px) 33px, calc(100% - 25px) 33px;
      background-size: 9px 9px, 9px 9px;
      background-repeat: no-repeat;
    }

    .note {
      grid-column: 1 / -1;
      min-height: 104px;
      display: flex;
      align-items: center;
      gap: 28px;
      margin-top: 5px;
      padding: 0 26px;
      border: 1px solid #7ebdff;
      border-radius: 9px;
      background: #f8fcff;
      color: var(--blue);
      font-size: 24px;
      line-height: 1.4;
      font-weight: 520;
    }

    .note-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: #006bff;
      flex: 0 0 auto;
    }

    body.embed-mode .page {
      width: min(1160px, calc(100% - 28px));
      margin: 14px auto 20px;
    }

    body.embed-mode .top-back {
      margin-bottom: 18px;
    }

    body.embed-mode .btn,
    body.embed-mode .back-btn {
      height: 52px;
      padding: 0 20px;
      font-size: 16px;
      gap: 10px;
    }

    body.embed-mode .back-btn {
      min-width: 136px;
    }

    body.embed-mode .hero {
      gap: 20px;
      margin-bottom: 24px;
    }

    body.embed-mode .title-wrap {
      gap: 16px;
    }

    body.embed-mode h1 {
      font-size: 48px;
    }

    body.embed-mode .badge {
      min-height: 36px;
      padding: 0 14px;
      font-size: 16px;
    }

    body.embed-mode .hero-actions {
      gap: 16px;
      padding-top: 8px;
    }

    body.embed-mode .btn-outline-green,
    body.embed-mode .btn-primary {
      min-width: 190px;
    }

    body.embed-mode .card {
      padding: 28px 28px 32px;
    }

    body.embed-mode .section-title {
      margin-bottom: 24px;
      font-size: 24px;
    }

    body.embed-mode .form-grid {
      gap: 24px 28px;
    }

    body.embed-mode .field label {
      margin-bottom: 10px;
      font-size: 16px;
    }

    body.embed-mode .input,
    body.embed-mode .select {
      height: 58px;
      padding: 0 18px;
      font-size: 16px;
    }

    body.embed-mode .select {
      padding-right: 42px;
      background-position: calc(100% - 21px) 25px, calc(100% - 15px) 25px;
      background-size: 7px 7px, 7px 7px;
    }

    body.embed-mode .note {
      min-height: 74px;
      gap: 16px;
      padding: 14px 18px;
      font-size: 16px;
    }

    body.embed-mode .note-icon {
      width: 34px;
      height: 34px;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      max-width: 430px;
      min-width: 280px;
      padding: 15px 18px;
      color: #07356f;
      background: #eef7ff;
      border: 1px solid #cae4ff;
      border-radius: 12px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
      font-size: 14px;
      font-weight: 760;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 960px) {
      .page {
        width: calc(100% - 28px);
      }

      .hero {
        flex-direction: column;
      }

      .hero-actions {
        justify-content: flex-start;
        padding-top: 0;
      }

      h1 {
        font-size: 52px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 30px 22px 36px;
      }

      h1 {
        font-size: 42px;
      }

      .title-wrap {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-actions,
      .btn,
      .back-btn,
      .btn-outline-green,
      .btn-primary {
        width: 100%;
      }

      .field label {
        font-size: 18px;
      }

      .input,
      .select {
        height: 62px;
        font-size: 18px;
      }

      .note {
        align-items: flex-start;
        padding: 22px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-back">
      <button class="back-btn" id="backBtn" type="button">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Kembali
      </button>
    </div>

    <section class="hero">
      <div class="title-wrap">
        <h1>Assign Surveyor</h1>
        <span class="badge" id="statusBadge">Draft</span>
      </div>

      <div class="hero-actions">
        <button class="btn btn-outline-green" id="draftBtn" type="button">
          <svg width="27" height="27" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 5h12l2 2v12H5V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            <path d="M8 5v6h8V5M8 19v-5h8v5" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
          </svg>
          Simpan Draft
        </button>

        <button class="btn btn-primary" id="saveBtn" type="button">
          <svg width="27" height="27" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 5h12l2 2v12H5V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            <path d="M8 5v6h8V5M8 19v-5h8v5" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
          </svg>
          Simpan
        </button>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Informasi Perencanaan</h2>

      <form id="assignForm" class="form-grid">
        <div class="field">
          <label for="projectName">Nama Proyek</label>
          <input class="input" id="projectName" name="projectName" type="text" value="Perencanaan Renovasi Sekolah 2025" />
        </div>

        <div class="field">
          <label for="schoolName">Nama Sekolah</label>
          <select class="select" id="schoolName" name="schoolName">
            <option value="SDN 1 Rembang" selected>SDN 1 Rembang</option>
            <option value="SDN 2 Dresi Kulon">SDN 2 Dresi Kulon</option>
            <option value="SMPN 1 Pancur">SMPN 1 Pancur</option>
            <option value="SMAN 1 Kragan">SMAN 1 Kragan</option>
          </select>
        </div>

        <div class="field">
          <label for="address">Alamat</label>
          <input class="input" id="address" name="address" type="text" value="Jl. Raya Rembang No. 12, Kec. Rembang" readonly />
        </div>

        <div class="field">
          <label for="province">Provinsi</label>
          <input class="input" id="province" name="province" type="text" value="Jawa Tengah" readonly />
        </div>

        <div class="field">
          <label for="regency">Kabupaten</label>
          <input class="input" id="regency" name="regency" type="text" value="Rembang" readonly />
        </div>

        <div class="field">
          <label for="district">Kecamatan</label>
          <input class="input" id="district" name="district" type="text" value="Rembang" readonly />
        </div>

        <div class="field">
          <label for="surveyor">Surveyor</label>
          <select class="select" id="surveyor" name="surveyor">
            <option value="Andika Pratama" selected>Andika Pratama</option>
            <option value="Rizky Saputra">Rizky Saputra</option>
            <option value="Nadia Kirana">Nadia Kirana</option>
            <option value="Dewi Anggraeni">Dewi Anggraeni</option>
          </select>
        </div>

        <div class="note">
          <span class="note-icon">
            <svg width="23" height="23" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 10v7M12 7h.01" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </span>
          <span>Alamat, provinsi, kabupaten, dan kecamatan terisi otomatis berdasarkan sekolah yang dipilih.</span>
        </div>
      </form>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const pageParams = new URLSearchParams(window.location.search);
    const isEmbed = pageParams.get("embed") === "1";
    if (isEmbed) {
      document.body.classList.add("embed-mode");
    }
    const schoolMaster = {
      "SDN 1 Rembang": {
        address: "Jl. Raya Rembang No. 12, Kec. Rembang",
        province: "Jawa Tengah",
        regency: "Rembang",
        district: "Rembang"
      },
      "SDN 2 Dresi Kulon": {
        address: "Jl. Dresi Kulon No. 8, Kec. Kaliori",
        province: "Jawa Tengah",
        regency: "Rembang",
        district: "Kaliori"
      },
      "SMPN 1 Pancur": {
        address: "Jl. Pancur Raya No. 21, Kec. Pancur",
        province: "Jawa Tengah",
        regency: "Rembang",
        district: "Pancur"
      },
      "SMAN 1 Kragan": {
        address: "Jl. Kragan Lasem Km. 4, Kec. Kragan",
        province: "Jawa Tengah",
        regency: "Rembang",
        district: "Kragan"
      }
    };

    const els = {
      schoolName: document.getElementById("schoolName"),
      address: document.getElementById("address"),
      province: document.getElementById("province"),
      regency: document.getElementById("regency"),
      district: document.getElementById("district"),
      projectName: document.getElementById("projectName"),
      surveyor: document.getElementById("surveyor"),
      statusBadge: document.getElementById("statusBadge"),
      toast: document.getElementById("toast")
    };

    function buildPayload() {
      return {
        id: "plan-" + Date.now(),
        projectName: els.projectName.value.trim(),
        schoolName: els.schoolName.value,
        address: els.address.value.trim(),
        province: els.province.value.trim(),
        kabupaten: els.regency.value.trim(),
        kecamatan: els.district.value.trim(),
        surveyor: els.surveyor.value
      };
    }

    function syncSchoolData() {
      const selectedSchool = els.schoolName.value;
      const data = schoolMaster[selectedSchool];
      if (!data) return;

      els.address.value = data.address;
      els.province.value = data.province;
      els.regency.value = data.regency;
      els.district.value = data.district;
      showToast(`Data wilayah untuk "${selectedSchool}" berhasil dimuat otomatis.`);
    }

    function saveDraft() {
      els.statusBadge.textContent = "Draft";
      if (isEmbed) {
        window.parent.postMessage({
          type: "perencanaan-project-saved",
          mode: "draft",
          payload: buildPayload()
        }, "*");
        return;
      }
      showToast("Draft assign surveyor berhasil disimpan.");
    }

    function saveFinal() {
      if (!els.projectName.value.trim()) {
        showToast("Nama proyek wajib diisi dulu, bro. Jangan simpan udara kosong.");
        els.projectName.focus();
        return;
      }

      if (!els.schoolName.value || !els.surveyor.value) {
        showToast("Nama sekolah dan surveyor wajib dipilih.");
        return;
      }

      els.statusBadge.textContent = "Assigned";
      if (isEmbed) {
        window.parent.postMessage({
          type: "perencanaan-project-saved",
          mode: "final",
          payload: buildPayload()
        }, "*");
        return;
      }
      showToast(`Surveyor "${els.surveyor.value}" berhasil diassign ke "${els.schoolName.value}".`);
    }

    function goBack() {
      if (isEmbed) {
        window.parent.postMessage({ type: "perencanaan-modal-close" }, "*");
        return;
      }
      window.history.back();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2600);
    }

    els.schoolName.addEventListener("change", syncSchoolData);
    document.getElementById("draftBtn").addEventListener("click", saveDraft);
    document.getElementById("saveBtn").addEventListener("click", saveFinal);
    document.getElementById("backBtn").addEventListener("click", goBack);
  </script>
</body>
</html>
